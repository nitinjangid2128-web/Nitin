<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Message ❤️</title>
    <style>
        :root {
            --pink: #ff4d6d;
            --soft-pink: #ffccd5;
            --dark-pink: #c9184a;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #fff0f3;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        /* Floating Hearts Animation */
        .heart {
            position: absolute;
            color: var(--pink);
            font-size: 20px;
            animation: float 4s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* Main Card */
        .container {
            z-index: 10;
            padding: 20px;
            width: 85%;
            max-width: 400px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { color: var(--dark-pink); margin-bottom: 10px; }
        p { color: #555; line-height: 1.6; }

        .big-heart {
            font-size: 60px;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: inline-block;
        }

        .big-heart:active { transform: scale(1.3); }

        .btn {
            background-color: var(--pink);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }

        /* Hidden Message Section */
        #secret-message {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border-top: 2px dashed var(--soft-pink);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
